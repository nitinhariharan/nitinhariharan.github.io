- name: Emotion Based Music Recommendation System
  logo: /images/sections/projects/tensorflow.png
  role: Owner
  timeline: "Nov 2022 - Nov 2022"
  #repo: https://github.com/tensorflow/tensorflow
  url: "https://github.com/mightycoderme2/Mood-Based-Music-Recommendation-System"
