- name: Hate Comment Detection
  role: Owner
  timeline: "Nov 2021 - Nov 2021"
  url: "https://github.com/nitinhariharan/hate-Comments-Detection-"
  summary: The prevalence of toxic comments in online discourse poses a significant challenge, necessitating the development of efficient tools for automatic identification and moderation. This project centers on leveraging cutting-edge technology to address this issue, employing DistilBERT, a streamlined version of BERT, known for its efficiency in natural language understanding.
  tags: ["personal", "machine-learning", "python"]


