- title: "ITAQ: Image Tag Recommendation Framework for Aquatic Species Integrating Semantic Intelligence via Knowledge Graphs"
  publishedIn:
    name: KGSWC-2023
    date: 15 November 2023
    url: https://kgswc.org/
  authors:
  - name: S S Nitin Hariharan
    url: https://scholar.google.com/citations?user=s1mWSAIAAAAJ&hl=en
  - name: Dr. Gerard Deepak
    url: https://scholar.google.com/citations?user=miP5DQ8AAAAJ&hl=en

  paper:
    summary: The ITAQ framework responds to the growing demand for advanced social image tagging in the Web 3.0 era. Specifically designed for tagging aquatic species images, it employs knowledge-centric methods aligned with semantic web standards. The framework integrates strategic knowledge curation through topic modeling, metadata generation, classification, ontology integration, and enrichment using knowledge graphs. It utilizes a balanced approach with lightweight machine learning through AdaBoost and CNN classifiers. Semantic reasoning is enhanced through context trees, KL divergence, and Second Order Co-occurrence PMI. The system's efficiency is further optimized by leveraging Ant Lion optimization for computing the most optimal solutions.
    url: https://link.springer.com/chapter/10.1007/978-3-031-47745-4_11
  categories: ["machinelearning","image-processing","recommendation-system"]
  tags: ["Machine Learning", "Recommendation System", "Image Processing"]

- title: "SSAT: Scientific Storyboarding Framework using Artificial Intelligence Techniques ( Yet To Publish )"
  publishedIn:
    name: IDSCS-2023
    date: 04 November 2023
    url: https://www.tssrf.co.in/
  authors:
  - name: S S Nitin Hariharan
    url: https://scholar.google.com/citations?user=s1mWSAIAAAAJ&hl=en
  - name: Dr. Gerard Deepak
    url: https://scholar.google.com/citations?user=miP5DQ8AAAAJ&hl=en

  paper:
    summary: This paper presents SSAT, a scientific storyboarding framework leveraging artificial intelligence for learning and inferencing. It employs Bi-LSTM and deep belief networks for classification, recurrent neural networks for knowledge gathering, explicit semantic analysis for entity selection, and the monkey algorithm for optimization, achieving high precision, recall, accuracy, and F-measure percentages, with a low False Discovery Rate.
    #url: https://link.springer.com/chapter/10.1007/978-3-031-47745-4_11
  categories: ["machinelearning","recommendation-system"]
  tags: ["Machine Learning", "Recommendation System"]


- title: "DRCS: Document Recommendation Framework for Cultural Studies as a Prospective Domain ( Accepted )"
  publishedIn:
    name: NaBIC 2023
    date: 31 October 2023
